# Build the container, push it to GitHub Container Registry, and deploy it to the
# api-paperdeck Azure App Service.
#
# Why a container rather than the previous Oryx ("Code") deployment: the diagram engine
# needs native libraries (libcairo2 for cairosvg; libX11/libXext/libXrender/libfontconfig
# for rdkit). The built-in Python image gives no way to install them, and BOTH libraries
# fail *soft* — rdkit raises ImportError which the chemistry renderer catches, and
# cairosvg raises OSError — so on Oryx the app came up looking healthy while silently
# rendering molecules with a crude fallback and refusing to export PDFs with diagrams.
#
# GHCR is used instead of ACR: App Service can pull from any registry, and GHCR is free.

name: Build and deploy container to Azure Web App - api-paperdeck

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GHCR

    env:
      DJANGO_SETTINGS_MODULE: paperdeck.settings
      DEBUG: 'True'          # tests run against the dev-style config
      USE_POSTGRES: 'True'
      DB_NAME: paperdeck
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: localhost
      DB_PORT: '5432'

    # The project cannot run on SQLite — courses/migrations/0003 uses raw Postgres DDL
    # (a `DO $$ … $$` block), so the test DB has to be real Postgres.
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: paperdeck
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Native libs so cairosvg and rdkit are actually USABLE on the runner — otherwise
      # diagrams/tests/test_deps.py would skip the very checks it exists to make, and CI
      # would go green on the exact breakage this container is meant to prevent.
      - name: Install native render libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libxrender1 libxext6 libx11-6 libfontconfig1

      # Run the test suite, then the production deployment checks. `check --deploy` with
      # DEBUG=False is what catches an insecure prod config (missing HSTS, cookies that
      # would travel over plain HTTP, a weak SECRET_KEY) BEFORE it ships.
      #
      # SECRET_KEY is generated per-run: settings.py refuses to start with DEBUG=False
      # and a weak/default key, which is exactly the behaviour we want to exercise here
      # rather than work around with a hardcoded short string.
      - name: Install dependencies and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "SECRET_KEY=$(python -c 'import secrets; print(secrets.token_urlsafe(64))')" >> "$GITHUB_ENV"
          python manage.py test --noinput

      - name: Production configuration checks
        run: python manage.py check --deploy --fail-level WARNING
        env:
          DEBUG: 'False'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # The image build itself asserts that cairosvg and rdkit are not merely installed
      # but actually usable (it draws a molecule). A missing native lib fails the build
      # here rather than shipping a quietly degraded renderer.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write        # for the OIDC login to Azure
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5898C24D7C124E05BB8B58AC64303D43 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E8FBEECC9D444C1B83E90B74C64560C7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_09154F50357D4D97B854BD793A8839FD }}

      # Deploy the exact SHA, never :latest — so a rollback is just a re-run of an older
      # commit's workflow, and two deploys can't disagree about what "latest" meant.
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-paperdeck'
          slot-name: 'Production'
          images: ghcr.io/${{ github.repository }}:${{ github.sha }}
